<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI PDF Analyser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 2.2rem;
      color: white;
      margin-bottom: 8px;
    }

    .header p {
      color: rgba(255,255,255,0.85);
      font-size: 1rem;
    }

    .input-box {
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 680px;
    }

    input[type="text"] {
      width: 100%;
      padding: 13px 16px;
      font-size: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      outline: none;
      margin-bottom: 10px;
      transition: border 0.3s;
      color: #333;
    }

    input[type="text"]:focus { border-color: #667eea; }

    .sample-btn {
      background: none;
      border: none;
      color: #667eea;
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 14px;
      padding: 0;
      text-decoration: underline;
    }

    .sample-btn:hover { color: #764ba2; }

    button#analyseBtn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.3s;
    }

    button#analyseBtn:hover { opacity: 0.9; }
    button#analyseBtn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Spinner */
    .loader {
      display: none;
      flex-direction: column;
      align-items: center;
      margin-top: 20px;
      gap: 12px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e0e0e0;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loader p {
      color: #667eea;
      font-size: 14px;
      font-weight: 500;
    }

    .error-box {
      display: none;
      margin-top: 14px;
      background: #fff5f5;
      border: 1px solid #fc8181;
      border-radius: 8px;
      padding: 12px 16px;
      color: #c53030;
      font-size: 14px;
    }

    #result {
      margin-top: 30px;
      width: 100%;
      max-width: 680px;
      display: none;
    }

    #result h2 {
      font-size: 1.2rem;
      color: white;
      margin-bottom: 16px;
      text-align: center;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 18px 22px;
      margin-bottom: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      border-left: 5px solid #667eea;
    }

    .card .label {
      font-size: 11px;
      text-transform: uppercase;
      color: #667eea;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .card .value {
      font-size: 15px;
      color: #1a1a2e;
      line-height: 1.7;
    }

    footer {
      margin-top: 40px;
      text-align: center;
      color: rgba(255,255,255,0.75);
      font-size: 13px;
      line-height: 1.8;
    }

    footer strong {
      color: white;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>📄 AI PDF Analyser</h1>
    <p>Paste any public PDF URL and get an instant AI-powered analysis</p>
  </div>

  <div class="input-box">
    <input type="text" id="pdfUrl" placeholder="https://arxiv.org/pdf/1706.03762" />

    <div>
      <button class="sample-btn" onclick="loadSample()">
        📎 Try Sample PDF
      </button>
    </div>

    <button id="analyseBtn" onclick="analyse()">🔍 Analyse PDF</button>

    <div class="loader" id="loader">
      <div class="spinner"></div>
      <p>Analysing your PDF, please wait...</p>
    </div>

    <div class="error-box" id="errorBox"></div>
  </div>

  <div id="result">
    <h2>📊 Analysis Result</h2>
    <div class="card">
      <div class="label">Document Type</div>
      <div class="value" id="documentType"></div>
    </div>
    <div class="card">
      <div class="label">Title</div>
      <div class="value" id="title"></div>
    </div>
    <div class="card">
      <div class="label">Authors</div>
      <div class="value" id="authors"></div>
    </div>
    <div class="card">
      <div class="label">Summary</div>
      <div class="value" id="summary"></div>
    </div>
    <div class="card">
      <div class="label">Key Takeaway</div>
      <div class="value" id="keyTakeaway"></div>
    </div>
  </div>

  <footer>
    <strong>AI PDF Analyser</strong><br/>
    Built with Spring Boot + PDFBox + Groq AI
  </footer>

  <script>
    function loadSample() {
      document.getElementById('pdfUrl').value = 'https://arxiv.org/pdf/1706.03762';
    }

    function showError(message) {
      const errorBox = document.getElementById('errorBox');
      errorBox.textContent = message;
      errorBox.style.display = 'block';
    }

    function hideError() {
      const errorBox = document.getElementById('errorBox');
      errorBox.textContent = '';
      errorBox.style.display = 'none';
    }

    async function analyse() {
      const url = document.getElementById('pdfUrl').value.trim();
      const btn = document.getElementById('analyseBtn');
      const resultDiv = document.getElementById('result');
      const loader = document.getElementById('loader');

      // Reset
      hideError();
      resultDiv.style.display = 'none';
      loader.style.display = 'none';

      if (!url) {
        showError('⚠️ Please enter a PDF URL.');
        return;
      }

      if (!url.startsWith('http')) {
        showError('❌ Invalid URL. Please provide a public PDF URL starting with https://');
        return;
      }

      // Show loading
      btn.disabled = true;
      btn.textContent = 'Analysing...';
      loader.style.display = 'flex';

      try {
        const response = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pdfUrl: url })
        });

        const data = await response.json();

        if (data.error) {
          showError('❌ Unable to access PDF. ' + data.error + ' Please provide a valid public PDF URL.');
        } else {
          document.getElementById('documentType').textContent = data.documentType || '-';
          document.getElementById('title').textContent = data.title || '-';
          document.getElementById('authors').textContent = data.authors || '-';
          document.getElementById('summary').textContent = data.summary || '-';
          document.getElementById('keyTakeaway').textContent = data.keyTakeaway || '-';
          resultDiv.style.display = 'block';
        }

      } catch (e) {
        showError('❌ Unable to access PDF. Please provide a valid public PDF URL.');
      } finally {
        btn.disabled = false;
        btn.textContent = '🔍 Analyse PDF';
        loader.style.display = 'none';
      }
    }
  </script>

</body>
</html>
